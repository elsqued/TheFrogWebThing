<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frog Official Website - The Swamp</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    /* minor tweaks to make it more "aero" */
    <style>
        /* Background en mode "tiles" (carreaux) comme demandé */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/1/18/Swamp_forests_in_PNG.jpg');
            background-repeat: repeat;
            background-size: 300px; /* Taille des carreaux */
            font-family: "Trebuchet MS", Helvetica, sans-serif; /* Police très 2013 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Fenêtre style 2013 "Frog Edition" */
        .swamp-window {
            width: 90%;
            max-width: 950px;
            height: 85vh;
            background-image: url('https://elsqued.neocities.org/frog.png')
            background-repeat: repeat;
            background: #2d4c1e; /* Vert foncé vaseux */
            border: 4px solid #1a2e12;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barre de titre style "Old School" */
        .title-bar {
            height: 45px;
            background: linear-gradient(to bottom, #4e7d34 0%, #2d4c1e 100%);
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 2px solid #1a2e12;
        }

        .title-text {
            color: #ccff00; /* Vert fluo grenouille */
            font-weight: bold;
            font-size: 18px;
            text-shadow: 2px 2px 0px #000;
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Boutons de fenêtre version marécage */
        .controls {
            display: flex;
            gap: 8px;
        }
        .btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #1a2e12;
            background: #5d9b3b;
            cursor: pointer;
        }
        .btn-close { 
            background: #a32a2a; 
            box-shadow: inset 0 0 5px #000;
        }

        /* Zone de contenu */
        .content-area {
            background: #f0f7e9; /* Blanc cassé verdâtre */
            margin: 10px;
            flex-grow: 1;
            border: 3px inset #2d4c1e;
            padding: 30px;
            overflow-y: auto;
            color: #1a2e12;
            border-radius: 5px;
            line-height: 1.6;
        }

        /* Titres dans le contenu */
        h1 {
            color: #2d4c1e;
            font-size: 32px;
            border-bottom: 3px double #4e7d34;
            padding-bottom: 5px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Rendu Markdown spécifique au thème */
        #md-render b, #md-render strong { color: #000; }
        #md-render a { 
            color: #3b7a1a; 
            font-weight: bold;
            text-decoration: underline; 
        }
        #md-render a:hover { 
            color: #ccff00;
            background: #2d4c1e;
        }

        /* Scrollbar style marécage */
        .content-area::-webkit-scrollbar {
            width: 12px;
        }
        .content-area::-webkit-scrollbar-track {
            background: #d4e3c8;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: #4e7d34;
            border: 2px solid #d4e3c8;
        }

        /* Notification Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2e12;
            color: #ccff00;
            padding: 12px 25px;
            border: 2px solid #ccff00;
            border-radius: 5px;
            display: none;
            z-index: 100;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="swamp-window">
        <div class="title-bar">
            <div class="title-text">
                <span>𓆏</span> Frog Squad - Official Swamp Node
            </div>
            <div class="controls">
                <div class="btn"></div>
                <div class="btn"></div>
                <div class="btn btn-close"></div>
            </div>
        </div>
        <div class="content-area">
            <h1>Welcome to the Swamp!</h1>
            <div id="md-render">Initializing swamp data...</div>
        </div>
    </div>

    <div id="toast">URL copied to clipboard! Stay croaky.</div>

    <script>
        const SPECIAL_URL = "https://frogsquadprecombat.aternos.me";
        const MD_SOURCE = "https://raw.githubusercontent.com/TheFrogenSource/About-us/refs/heads/main/README.md";

        async function loadMarkdown() {
            try {
                const response = await fetch(MD_SOURCE);
                const text = await response.text();
                const container = document.getElementById('md-render');
                
                container.innerHTML = marked.parse(text);

                const links = container.querySelectorAll('a');
                links.forEach(link => {
                    const href = link.href.replace(/\/$/, ""); 
                    
                    if (href === SPECIAL_URL) {
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            navigator.clipboard.writeText(SPECIAL_URL);
                            showToast();
                        });
                    } else {
                        link.target = "_blank";
                        link.rel = "noopener noreferrer";
                    }
                });
            } catch (e) {
                document.getElementById('md-render').innerText = "Error: The frogs couldn't find the file.";
            }
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2500);
        }

        loadMarkdown();
    </script>
</body>
</html>
